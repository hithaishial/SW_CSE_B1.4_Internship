<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h1>HTML Tables</h1>
    <table border="2">
        <caption>monthly savings report</caption>
        <tr>
            <th>month</th>
            <th>savings</th>
        </tr>
        <tr>
            <td>june</td>
            <td>4000</td>
        </tr>
        <tr>
            <td>july</td>
            <td>3000</td>
        </tr>
    </table>

    <table>
       <caption>monthly sales</caption> 
       <thead>
        <tr>
            <th>
                month
            </th>
            <th>sales</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>april</td>
            <td>2000</td>
        </tr>
        <tr>
            <td>may</td>
            <td>6000</td>
        </tr>
        </tbody>
       <tfoot>
        <tr>
            <td>total</td>
            <td>8000</td>
        </tr>
       </tfoot>
    </table>
</body>
</html>
