<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tag: span row/column</title>
</head>
<body>
    <table border="4">
        <tr>
            <th colspan="3">Student details</th>
        </tr>
        <tr>
            <td>Name</td>
            <td>Hithaishi</td>
            <td>Arjun</td>
        </tr>
        <tr>
            <td>Age</td>
            <td>19</td>
            <td>19</td>
        </tr>
    </table>
</body>
</html>
