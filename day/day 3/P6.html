<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio tag</title>
</head>
<body>
     <audio src="https://samplelib.com/mp3/sample-12s.mp3" autoplay muted controls>Your browser does not support the audio tag

     </audio>

    <!-- Audio formats
    1. Mp3
    2. OGG
    3. WAV    
    -->

    <audio src="https://samplelib.com/mp3/sample-12s.mp3" autoplay muted loop preload="auto" controls>Your browser does not support the audio tag</audio>
     <!-- Preload -->
    <!-- none: Don't preload; load only when user starts playing -->
    <!-- metadata: Load only information like duration, dimensions etc -->
    <!-- auto: Automatic: Browser load video immediately -->
</body>
</html>
